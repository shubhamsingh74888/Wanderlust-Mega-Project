# StorageClass for AWS EBS dynamic provisioning.
# This replaces the hostPath PersistentVolume, which was tied to a single node.
# EBS CSI driver must be installed on your cluster.
# On EKS: eksctl utils associate-iam-oidc-provider + install aws-ebs-csi-driver addon.
# On kubeadm: install https://github.com/kubernetes-sigs/aws-ebs-csi-driver

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: wanderlust-ebs
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer   # provision only when a pod is scheduled
reclaimPolicy: Retain                      # keep the volume if the PVC is deleted
parameters:
  type: gp3
  # !! CHANGE: set to the AWS region your cluster runs in
  csi.storage.k8s.io/fstype: ext4
